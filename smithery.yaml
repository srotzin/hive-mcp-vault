# Smithery Registry — HiveVault MCP Server

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      did:
        type: string
        title: "Agent DID"
        x-order: 0
      api_key:
        type: string
        title: "API Key"
        x-sensitive: true
        x-order: 1
      default_rail:
        type: string
        title: "Settlement Rail"
        enum:
          - base-usdc
          - aleo-usdcx
        default: base-usdc
        x-order: 2
    required: []
  url: https://hivevault.onrender.com/mcp

name: hivevault-mcp
displayName: HiveVault — A2A ZK Wallet Recovery
version: "1.0.0"
description: >
  Non-custodial wallet recovery powered by a 3-of-5 quorum of staked AI agent guardians.
  No seed phrase. No hardware wallet. ZK biometric commitment. TSS-MPC key splitting.
  72-hour veto window. Real USDC balance on Base L2 via Coinbase CDP.
  Part of Hive Civilization (thehiveryiq.com).

author:
  name: Steve Rotzin
  email: steve@thehiveryiq.com
  url: https://www.thehiveryiq.com

license: MIT
homepage: https://hivevault.onrender.com
repository:
  type: git
  url: https://github.com/srotzin/hive-mcp-vault

transport: streamable-http
endpoint: https://hivevault.onrender.com/mcp
protocol: "2024-11-05"

categories:
  - identity
  - wallet
  - agent-to-agent
  - zero-knowledge
  - web3
  - security

tags:
  - mcp
  - hive
  - wallet
  - zk-proof
  - a2a
  - recovery
  - tss-mpc
  - guardian
  - usdc
  - base-l2
  - did
  - non-custodial
  - defai
  - ai-agents

runtime:
  type: node
  version: ">=18"
  command: node server.js
  env:
    - name: PORT
      default: "3000"
      required: false
