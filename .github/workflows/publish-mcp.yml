name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for GitHub OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sSL -o /tmp/mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp
          sudo install /tmp/mcp-publisher /usr/local/bin/mcp-publisher

      - name: Validate server.json
        run: mcp-publisher validate ./server.json

      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish
        run: mcp-publisher publish ./server.json
